services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ticreactoe}
      POSTGRES_USER: ${POSTGRES_USER:-ticreactoe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your .env file}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ticreactoe} -d ${POSTGRES_DB:-ticreactoe}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: ./34726-ticreactoe-api
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in your .env file}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_DATABASE_URL: postgres://${POSTGRES_USER:-ticreactoe}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ticreactoe}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost}
      DJANGO_FRONTEND_URL: ${DJANGO_FRONTEND_URL:-http://localhost}
      DJANGO_TIME_ZONE: ${DJANGO_TIME_ZONE:-UTC}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./34726-ticreactoe
      args:
        VITE_BACKEND_URL: ""
    ports:
      - "${PORT:-80}:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
